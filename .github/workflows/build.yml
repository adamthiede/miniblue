---
name: build-ublue-custom
on:
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '5 2 * * 6'
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  MY_IMAGE_NAME: "${{ github.event.repository.name }}"  # the name of the image produced by this build, matches repo names
  MY_IMAGE_DESC: "Adam's Customized Fedora Atomic Desktop"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  IMAGE_NAME: "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"  # do not edit

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Checkout push-to-registry action GitHub repository
      - name: Checkout Push to Registry action
        uses: actions/checkout@v6

      #- name: Maximize build space
      #  uses: flatpaks/runner-cleanup@3
      - name: login into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: get latest fedora version
        id: fver
        run: |
          echo "fver=$(curl -s 'https://bodhi.fedoraproject.org/releases/?state=current'|jq -r '.releases[]|select(.name|startswith("F"))|.version'|sort -r|head -n1)" >> $GITHUB_OUTPUT

      - name: docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push image
        id: buildpush
        uses: docker/build-push-action@v7
        with:
          file: ./Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ steps.fver.outputs.fver }}
          build-args: |
            FEDORA=${{ steps.fver.outputs.fver }}

      # This section is optional and only needs to be enabled in you plan on distributing
      # your project to others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.

      # Sign container
      - uses: sigstore/cosign-installer@v4.1.0
        if: github.event_name != 'pull_request'

      - name: Sign container image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${{ env.IMAGE_NAME }}@${TAGS}
        env:
          TAGS: ${{ steps.buildpush.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
